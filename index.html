<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="營養追蹤">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='white'/%3E%3Ctext y='.9em' font-size='85'%3E🥗%3C/text%3E%3C/svg%3E">
<title>營養追蹤</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');

:root {
–bg: #f7f5f0;
–bg2: #eeeae2;
–card: #ffffff;
–text: #1a1a1a;
–text2: #6b6b6b;
–text3: #9a9a9a;
–accent: #2d5016;
–accent2: #4a7c2f;
–accent-light: #e8f0e0;
–red: #c0392b;
–red-light: #fbeaea;
–amber: #b7681a;
–amber-light: #fdf3e3;
–border: rgba(0,0,0,0.08);
–border2: rgba(0,0,0,0.14);
–radius: 14px;
–radius-sm: 8px;
–font: ‘Noto Sans TC’, sans-serif;
–mono: ‘DM Mono’, monospace;
}

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
font-family: var(–font);
background: var(–bg);
color: var(–text);
min-height: 100vh;
max-width: 430px;
margin: 0 auto;
overflow-x: hidden;
}

/* Header */
.header {
background: var(–card);
border-bottom: 1px solid var(–border);
padding: 16px 20px 12px;
position: sticky;
top: 0;
z-index: 100;
display: flex;
align-items: center;
justify-content: space-between;
}
.header-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.header-date { font-size: 12px; color: var(–text2); font-family: var(–mono); }

/* Tabs */
.tabs {
background: var(–card);
border-bottom: 1px solid var(–border);
display: flex;
position: sticky;
top: 57px;
z-index: 99;
}
.tab {
flex: 1;
padding: 10px 4px 8px;
text-align: center;
font-size: 11px;
font-weight: 500;
color: var(–text3);
cursor: pointer;
border-bottom: 2px solid transparent;
transition: all 0.15s;
line-height: 1.8;
}
.tab svg { display: block; margin: 0 auto 2px; }
.tab.active { color: var(–accent); border-bottom-color: var(–accent); }

/* Content */
.content { padding: 16px; padding-bottom: 40px; }

/* Section */
.sec-label {
font-size: 10px;
font-weight: 700;
letter-spacing: 1px;
text-transform: uppercase;
color: var(–text3);
margin: 20px 0 8px;
}
.sec-label:first-child { margin-top: 0; }

/* Card */
.card {
background: var(–card);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 14px 16px;
margin-bottom: 10px;
}

/* Date nav */
.date-nav {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 16px;
}
.date-nav-label { font-size: 16px; font-weight: 700; }
.nav-btn {
width: 34px; height: 34px;
border-radius: var(–radius-sm);
border: 1px solid var(–border2);
background: var(–card);
color: var(–text2);
cursor: pointer;
display: flex; align-items: center; justify-content: center;
font-size: 16px;
transition: background 0.1s;
}
.nav-btn:active { background: var(–bg2); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }

/* Form elements */
select, input[type=text], input[type=number] {
font-family: var(–font);
font-size: 14px;
color: var(–text);
background: var(–bg);
border: 1px solid var(–border2);
border-radius: var(–radius-sm);
padding: 0 12px;
height: 40px;
width: 100%;
outline: none;
transition: border-color 0.15s;
-webkit-appearance: none;
}
select:focus, input:focus { border-color: var(–accent2); }

.form-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.form-row:last-child { margin-bottom: 0; }
.form-label { font-size: 12px; color: var(–text2); white-space: nowrap; min-width: 52px; }
.form-row input[type=number] { width: 80px; flex: none; text-align: center; font-family: var(–mono); }

/* Buttons */
.btn {
font-family: var(–font);
font-size: 14px;
font-weight: 500;
padding: 0 16px;
height: 40px;
border-radius: var(–radius-sm);
border: 1px solid var(–border2);
background: var(–card);
color: var(–text);
cursor: pointer;
white-space: nowrap;
transition: all 0.1s;
display: inline-flex;
align-items: center;
gap: 6px;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
background: var(–accent);
border-color: var(–accent);
color: #fff;
}
.btn-full { width: 100%; justify-content: center; margin-top: 10px; }
.btn-danger { color: var(–red); border-color: rgba(192,57,43,0.3); font-size: 12px; height: 30px; padding: 0 10px; }
.btn-sm { height: 32px; font-size: 12px; padding: 0 12px; }

/* Tags */
.tag {
display: inline-flex;
align-items: center;
padding: 3px 9px;
border-radius: 20px;
font-size: 12px;
font-weight: 500;
background: var(–accent-light);
color: var(–accent);
font-family: var(–mono);
}
.tag-amber { background: var(–amber-light); color: var(–amber); }
.tag-red { background: var(–red-light); color: var(–red); }

/* Exercise pill row */
.ex-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }

/* Food log items */
.log-item {
display: flex;
align-items: center;
justify-content: space-between;
padding: 9px 0;
border-bottom: 1px solid var(–border);
gap: 8px;
}
.log-item:last-child { border-bottom: none; }
.log-name { font-size: 14px; font-weight: 500; }
.log-sub { font-size: 11px; color: var(–text2); font-family: var(–mono); margin-top: 2px; }
.del-btn {
width: 26px; height: 26px;
border-radius: 50%;
border: 1px solid var(–border2);
background: transparent;
color: var(–text3);
cursor: pointer;
display: flex; align-items: center; justify-content: center;
font-size: 15px;
flex-shrink: 0;
transition: all 0.1s;
}
.del-btn:active { background: var(–red-light); color: var(–red); border-color: var(–red); }

/* Add food row */
.add-row { display: flex; gap: 8px; margin-top: 12px; }
.add-row select { flex: 1; }

/* Stat grid */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.stat-card {
background: var(–bg2);
border-radius: var(–radius-sm);
padding: 12px 14px;
}
.stat-card-label { font-size: 11px; color: var(–text2); margin-bottom: 4px; }
.stat-card-value { font-size: 22px; font-weight: 700; font-family: var(–mono); letter-spacing: -0.5px; }
.stat-card-unit { font-size: 11px; color: var(–text2); margin-left: 2px; font-family: var(–font); }

/* Progress bars */
.prog-row { margin-bottom: 12px; }
.prog-row:last-child { margin-bottom: 0; }
.prog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.prog-name { font-size: 13px; font-weight: 500; }
.prog-nums { font-size: 11px; color: var(–text2); font-family: var(–mono); }
.prog-track { height: 7px; background: var(–bg2); border-radius: 4px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 4px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }
.badge {
font-size: 10px;
font-weight: 700;
padding: 2px 7px;
border-radius: 20px;
font-family: var(–mono);
letter-spacing: 0.3px;
}
.badge-ok { background: var(–accent-light); color: var(–accent); }
.badge-deficit { background: var(–red-light); color: var(–red); }
.badge-surplus { background: var(–amber-light); color: var(–amber); }

/* History items */
.hist-item {
display: flex;
justify-content: space-between;
align-items: center;
padding: 10px 0;
border-bottom: 1px solid var(–border);
gap: 8px;
}
.hist-item:last-child { border-bottom: none; }
.hist-date { font-size: 12px; font-family: var(–mono); color: var(–text2); }
.hist-name { font-size: 13px; font-weight: 500; }
.hist-cal { font-size: 12px; color: var(–text2); font-family: var(–mono); margin-top: 2px; }

/* Data mgmt */
.data-row { display: flex; gap: 8px; margin-bottom: 8px; }
.data-row .btn { flex: 1; justify-content: center; }

/* Empty state */
.empty {
text-align: center;
padding: 32px 16px;
color: var(–text3);
font-size: 13px;
}
.empty-icon { font-size: 36px; margin-bottom: 8px; }

/* Toast */
.toast {
position: fixed;
bottom: 24px;
left: 50%;
transform: translateX(-50%) translateY(80px);
background: #1a1a1a;
color: #fff;
padding: 10px 20px;
border-radius: 20px;
font-size: 13px;
font-weight: 500;
z-index: 999;
transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>

</head>
<body>

<div class="header">
  <div class="header-title">🥗 營養追蹤</div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:1px">
    <div class="header-date" id="header-date"></div>
    <div style="font-size:10px;color:var(--text3);font-family:var(--mono);min-height:14px" id="sync-status"></div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('daily')" id="tab-daily">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    今日
  </div>
  <div class="tab" onclick="switchTab('summary')" id="tab-summary">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    分析
  </div>
  <div class="tab" onclick="switchTab('exercise')" id="tab-exercise">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
    運動
  </div>
  <div class="tab" onclick="switchTab('foods')" id="tab-foods">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
    食物庫
  </div>
  <div class="tab" onclick="switchTab('settings')" id="tab-settings">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    設定
  </div>
</div>

<div class="content" id="main-content"></div>
<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const DEFAULT_STATE = {
  exercises: [
    {id:1,name:'臀腿',bmr:1150,strength:180,cardio:0,tdee:1330},
    {id:2,name:'臀腿+有氧',bmr:1150,strength:180,cardio:220,tdee:1550},
    {id:3,name:'胸肩三頭',bmr:1150,strength:150,cardio:0,tdee:1300},
    {id:4,name:'胸肩三頭+有氧',bmr:1150,strength:150,cardio:220,tdee:1520},
    {id:5,name:'背二頭',bmr:1150,strength:160,cardio:0,tdee:1310},
    {id:6,name:'背二頭+有氧',bmr:1150,strength:160,cardio:220,tdee:1530},
    {id:7,name:'胸肩三頭背二頭',bmr:1150,strength:220,cardio:0,tdee:1370},
    {id:8,name:'胸肩三頭背二頭+有氧',bmr:1150,strength:220,cardio:220,tdee:1590},
    {id:9,name:'純有氧',bmr:1150,strength:0,cardio:220,tdee:1370},
  ],
  foods: [
    {id:1,name:'一根香蕉',cal:90,p:1.1,f:0.3,c:23,cat:'水果',healthy:true},
    {id:2,name:'高蛋白+水',cal:140,p:30,f:1,c:3,cat:'蛋白補充',healthy:true},
    {id:3,name:'高蛋白+無糖豆漿',cal:225,p:45,f:6,c:7,cat:'蛋白補充',healthy:true},
    {id:4,name:'原塊嫩雞起司蛋白堡',cal:350,p:25,f:12,c:35,cat:'正餐',healthy:true},
    {id:5,name:'無糖豆漿中杯',cal:100,p:10,f:5,c:4,cat:'飲品',healthy:true},
    {id:6,name:'無糖豆漿大杯',cal:150,p:15,f:8,c:6,cat:'飲品',healthy:true},
    {id:7,name:'原味蛋餅',cal:260,p:10,f:12,c:28,cat:'早餐',healthy:true},
    {id:8,name:'起司蛋餅',cal:320,p:15,f:17,c:29,cat:'早餐',healthy:true},
    {id:9,name:'半熟荷包蛋x2',cal:150,p:14,f:10,c:1,cat:'早餐',healthy:true},
    {id:10,name:'飽哥滷雞腿便當',cal:490,p:35,f:20,c:40,cat:'正餐',healthy:true},
    {id:11,name:'飽哥鯖魚便當',cal:540,p:30,f:35,c:35,cat:'正餐',healthy:true},
  ],
  categories: ['早餐','正餐','蛋白補充','飲品','水果','點心'],
  logs: {},
  nextFoodId: 100,
  nextExId: 50,
  goals: { pRatio: 0.30, fRatio: 0.25, cRatio: 0.45 }
};

const API_URL = 'https://script.google.com/macros/s/AKfycbzBoFO2JKvGIXCdwaLsDHOap6sud-cti8uvN1r1dPSikcC5J9LE7h1hBg-RT7X3ujzg/exec';

let S = JSON.parse(JSON.stringify(DEFAULT_STATE));
let currentTab = 'daily';
let dateOffset = 0;
let saveTimer = null;

function showSyncStatus(msg) {
  const el = document.getElementById('sync-status');
  if (el) el.textContent = msg;
}

// JSONP load - bypasses CORS for GET
function loadState() {
  showSyncStatus('載入中…');
  const callbackName = 'ntCallback_' + Date.now();
  const script = document.createElement('script');
  script.src = API_URL + '?callback=' + callbackName;
  window[callbackName] = function(data) {
    try {
      if (data && data.foods) S = data;
    } catch(e) {}
    delete window[callbackName];
    document.body.removeChild(script);
    render();
    showSyncStatus('');
  };
  script.onerror = function() {
    delete window[callbackName];
    try { document.body.removeChild(script); } catch(e) {}
    showSyncStatus('⚠️ 載入失敗');
    render();
  };
  document.body.appendChild(script);
}

// no-cors POST for save (fire and forget, then verify with GET)
function saveState() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    showSyncStatus('儲存中…');
    const data = JSON.stringify(S);
    // Use a form POST via fetch with no-cors to avoid CORS preflight
    fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: data
    }).then(() => {
      showSyncStatus('✓ 已同步');
      setTimeout(() => showSyncStatus(''), 2500);
    }).catch(() => {
      showSyncStatus('⚠️ 儲存失敗');
    });
  }, 1500);
}

// ── Date helpers ───────────────────────────────────────────────────────────
function getDateKey(offset=0) {
  const d = new Date(); d.setDate(d.getDate() + offset);
  return d.toISOString().slice(0,10);
}
function getDateLabel(offset=0) {
  const d = new Date(); d.setDate(d.getDate() + offset);
  const mm = d.getMonth()+1, dd = d.getDate(), dow = ['日','一','二','三','四','五','六'][d.getDay()];
  if(offset===0) return `今天（週${dow}）`;
  if(offset===-1) return `昨天 ${mm}/${dd}`;
  return `${mm}/${dd}（週${dow}）`;
}
function getLog(offset=0) {
  const k = getDateKey(offset);
  if(!S.logs[k]) S.logs[k] = {exerciseId:null, foodIds:[], customItems:[]};
  if(!S.logs[k].customItems) S.logs[k].customItems = [];
  return S.logs[k];
}

// ── Tab switching ──────────────────────────────────────────────────────────
function switchTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  render();
}

// ── Toast ──────────────────────────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2200);
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('header-date').textContent = getDateLabel(dateOffset);
  const el = document.getElementById('main-content');
  if(currentTab==='daily') el.innerHTML = renderDaily();
  else if(currentTab==='summary') el.innerHTML = renderSummary();
  else if(currentTab==='exercise') el.innerHTML = renderExercise();
  else if(currentTab==='foods') el.innerHTML = renderFoods();
  else el.innerHTML = renderSettings();
}

// ── Daily ──────────────────────────────────────────────────────────────────
function renderDaily() {
  const log = getLog(dateOffset);
  const ex = S.exercises.find(e=>e.id===log.exerciseId);
  const tdee = ex ? ex.tdee : 0;
  const eaten = log.foodIds.map(id=>S.foods.find(f=>f.id===id)).filter(Boolean);
  const custom = log.customItems || [];
  const allEaten = [...eaten.map(f=>({...f,isCustom:false})), ...custom.map((f,i)=>({...f,isCustom:true,customIdx:i}))];
  const totalCal = allEaten.reduce((s,f)=>s+f.cal,0);
  const totalP = +allEaten.reduce((s,f)=>s+f.p,0).toFixed(1);
  const totalF = +allEaten.reduce((s,f)=>s+f.f,0).toFixed(1);
  const totalC = +allEaten.reduce((s,f)=>s+f.c,0).toFixed(1);

  const exOpts = S.exercises.map(e=>`<option value="${e.id}" ${log.exerciseId===e.id?'selected':''}>${e.name}（TDEE ${e.tdee}）</option>`).join('');
  const cats = S.categories || [];
  const foodOpts = cats.length
    ? cats.map(cat => {
        const items = S.foods.filter(f=>f.cat===cat);
        if(!items.length) return '';
        return `<optgroup label="${cat}">${items.map(f=>`<option value="${f.id}">${f.name}（${f.cal} kcal）</option>`).join('')}</optgroup>`;
      }).join('') + (() => {
        const uncats = S.foods.filter(f=>!f.cat);
        return uncats.length ? `<optgroup label="其他">${uncats.map(f=>`<option value="${f.id}">${f.name}（${f.cal} kcal）</option>`).join('')}</optgroup>` : '';
      })()
    : S.foods.map(f=>`<option value="${f.id}">${f.name}（${f.cal} kcal）</option>`).join('');
  const logItems = allEaten.length ? allEaten.map((f,i)=>`
    <div class="log-item">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:5px">
          <span class="log-name">${f.name}</span>
          ${f.isCustom?`<span style="font-size:10px;background:#eeeae2;color:#6b6b6b;padding:1px 6px;border-radius:10px">一次性</span>`:f.healthy===false?`<span style="font-size:10px;background:#fbeaea;color:#c0392b;padding:1px 6px;border-radius:10px">不健康</span>`:''}
        </div>
        <div class="log-sub">${f.cal}kcal · P${f.p}g F${f.f}g C${f.c}g</div>
      </div>
      <button class="del-btn" onclick="${f.isCustom?`removeCustomLog(${f.customIdx})`:`removeFoodLog(${i})`}">×</button>
    </div>`).join('') : `<div class="empty"><div class="empty-icon">🍽️</div>還沒有飲食記錄</div>`;

  const pGoal = tdee ? Math.round(tdee * S.goals.pRatio / 4) : 0;

  return `

        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <span class="date-nav-label">${getDateLabel(dateOffset)}</span>
    </div>
    <button class="nav-btn" onclick="changeDate(1)" ${dateOffset>=0?'disabled':''}>›</button>

  <div class="sec-label">今日運動</div>
  <div class="card">
    <select onchange="setExercise(this.value)">
      <option value="">— 選擇運動類型 —</option>

    </select>
    ${ex ? `<div class="ex-tags">
      <span class="tag">TDEE ${ex.tdee} kcal</span>
      ${ex.strength ? `<span class="tag tag-amber">阻力 ${ex.strength} kcal</span>` : ''}
      ${ex.cardio ? `<span class="tag tag-red">有氧 ${ex.cardio} kcal</span>` : ''}
    </div>` : ''}
  </div>

  <div class="sec-label">今日飲食</div>
  <div class="card">
    ${logItems}
    <div class="add-row">
      <select id="food-picker">${foodOpts}</select>
      <button class="btn btn-primary btn-sm" onclick="addFoodLog()">＋加入</button>

    <div id="custom-form" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
      <div class="form-row"><span class="form-label">名稱</span><input type="text" id="cf-name" placeholder="食物名稱"></div>
      <div class="form-row">
        <span class="form-label">熱量</span><input type="number" id="cf-cal" placeholder="kcal" style="width:72px;flex:none">
        <span class="form-label" style="margin-left:8px">蛋白</span><input type="number" id="cf-p" placeholder="g" style="width:60px;flex:none">
      </div>
      <div class="form-row">
        <span class="form-label">脂肪</span><input type="number" id="cf-f" placeholder="g" style="width:72px;flex:none">

  </div>

  <div class="sec-label">今日總結</div>
  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-card-label">攝取熱量</div>
      <div class="stat-card-value">${totalCal}<span class="stat-card-unit">kcal</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">TDEE 目標</div>
      <div class="stat-card-value">${tdee || '—'}<span class="stat-card-unit">${tdee?'kcal':''}</span></div>
    </div>
  </div>

  ${tdee ? `<div class="card">
    ${renderBar('熱量', totalCal, tdee, 'kcal', 300)}
    ${renderBar('蛋白質', totalP, pGoal, 'g', 999)}
    ${renderBar('脂肪', totalF, fGoal, 'g', 20)}
    ${renderBar('碳水', totalC, cGoal, 'g', 70)}
  </div>` : `<div class="card"><div class="empty"><div class="empty-icon">👆</div>選擇運動類型後顯示分析</div></div>`}`;
}

function renderBar(name, actual, goal, unit, overMax=999) {
  const pct = goal ? Math.min(Math.round(actual / goal * 100), 130) : 0;
  const diff = actual - goal;
  const isDeficit = diff < 0;
  const isOver = diff > overMax;
  const isOk = !isDeficit && !isOver;
  const color = isOver ? '#c0392b' : isDeficit ? '#b7681a' : '#2d5016';
  const badge = isOver
    ? `<span class="badge badge-deficit">超 ${+(actual-goal).toFixed(1)}${unit}</span>`
    : isDeficit
    ? `<span class="badge badge-surplus">缺 ${+(goal-actual).toFixed(1)}${unit}</span>`
    : `<span class="badge badge-ok">達標</span>`;
  return `<div class="prog-row">
    <div class="prog-header">
      <span class="prog-name">${name}</span>
      ${badge}
    </div>
    <div style="display:flex;justify-content:space-between;margin-bottom:5px">
      <span class="prog-nums">${actual} / ${goal} ${unit}</span>
      <span class="prog-nums">${pct}%</span>
    </div>
    <div class="prog-track"><div class="prog-fill" style="width:${Math.min(pct,100)}%;background:${color}"></div></div>
  </div>`;
}

// ── Summary ────────────────────────────────────────────────────────────────
function renderSummary() {
  const keys = Object.keys(S.logs).filter(k=>S.logs[k].foodIds.length||S.logs[k].exerciseId).sort().reverse();
  if(!keys.length) return `<div class="empty" style="margin-top:60px"><div class="empty-icon">📊</div>還沒有記錄<br>先去今日分頁記錄吧</div>`;

  const recent = keys.slice(0,14);
  const avgCal = Math.round(recent.reduce((s,k)=>{
    return s + S.logs[k].foodIds.map(id=>S.foods.find(f=>f.id===id)).filter(Boolean).reduce((ss,f)=>ss+f.cal,0);
  },0)/recent.length);
  const avgP = +(recent.reduce((s,k)=>{
    return s + S.logs[k].foodIds.map(id=>S.foods.find(f=>f.id===id)).filter(Boolean).reduce((ss,f)=>ss+f.p,0);
  },0)/recent.length).toFixed(1);

  const rows = recent.map(k=>{
    const log = S.logs[k];
    const ex = S.exercises.find(e=>e.id===log.exerciseId);
    const eaten = log.foodIds.map(id=>S.foods.find(f=>f.id===id)).filter(Boolean);
    const totalCal = eaten.reduce((s,f)=>s+f.cal,0);
    const tdee = ex ? ex.tdee : 0;
    const diff = tdee ? totalCal - tdee : null;
    const [,m,d] = k.split('-');
    return `<div class="hist-item">
      <div style="flex:1;min-width:0">
        <div class="hist-date">${m}/${d}</div>
        <div class="hist-name">${ex ? ex.name : '無運動記錄'}</div>
        <div class="hist-cal">${totalCal} kcal 攝取${tdee?' · TDEE '+tdee:''}</div>
      </div>
      ${diff!==null ? `<span class="badge ${diff>50?'badge-surplus':diff<-50?'badge-deficit':'badge-ok'}">${diff>0?'+':''}${diff}</span>` : ''}
    </div>`;
  }).join('');

  return `
  <div class="sec-label">近期平均（${recent.length}天）</div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-card-label">平均熱量</div><div class="stat-card-value">${avgCal}<span class="stat-card-unit">kcal</span></div></div>
    <div class="stat-card"><div class="stat-card-label">平均蛋白質</div><div class="stat-card-value">${avgP}<span class="stat-card-unit">g</span></div></div>
  </div>
  <div class="sec-label">歷史記錄</div>
  <div class="card">${rows}</div>`;
}

    { key: 'unhealthy', label: '不健康', foods: S.foods.filter(f=>!f.healthy) },
  ];

  const folders = groups.map(g => {
    if(!g.foods.length) return '';
    const isOpen = window._openHealth[g.key] !== false;

// ── Actions ────────────────────────────────────────────────────────────────
function changeDate(d) {
  if(dateOffset + d > 0) return;
  dateOffset += d; render();
}
function setExercise(v) {
  const log = getLog(dateOffset);
  log.exerciseId = v ? parseInt(v) : null;
  saveState(); render();
}
function addFoodLog() {
  const v = document.getElementById('food-picker').value;
  if(!v) return;
  const log = getLog(dateOffset);
  log.foodIds.push(parseInt(v));
  saveState(); render();
}
function removeFoodLog(i) {
  const log = getLog(dateOffset);
  log.foodIds.splice(i, 1);
  saveState(); render();
}
function addCustomLog() {
  const name = document.getElementById('cf-name').value.trim();
  const cal  = parseFloat(document.getElementById('cf-cal').value)||0;
  const p    = parseFloat(document.getElementById('cf-p').value)||0;
  const f    = parseFloat(document.getElementById('cf-f').value)||0;
  const c    = parseFloat(document.getElementById('cf-c').value)||0;
  if(!name||!cal){showToast('請填入名稱和熱量');return;}
  const log = getLog(dateOffset);
  log.customItems.push({name,cal,p,f,c});
  saveState(); showToast('已加入「'+name+'」'); render();
}
function removeCustomLog(i) {
  const log = getLog(dateOffset);
  log.customItems.splice(i,1);
  saveState(); render();
}
function addExercise() {
  const name = document.getElementById('ex-name').value.trim();
  const bmr = parseInt(document.getElementById('ex-bmr').value)||0;
  const str = parseInt(document.getElementById('ex-str').value)||0;
  const car = parseInt(document.getElementById('ex-car').value)||0;
  if(!name) { showToast('請填入名稱'); return; }
  S.exercises.push({id: S.nextExId++, name, bmr, strength:str, cardio:car, tdee:bmr+str+car});
  saveState(); showToast('已新增「'+name+'」'); render();
}
function deleteExercise(id) {
  if(!confirm('確定刪除這個運動類型？')) return;
  S.exercises = S.exercises.filter(e=>e.id!==id);
  saveState(); render();
}
function addFood() {
  const name = document.getElementById('f-name').value.trim();
  const cal = parseFloat(document.getElementById('f-cal').value)||0;
  const p = parseFloat(document.getElementById('f-p').value)||0;
  const f = parseFloat(document.getElementById('f-f').value)||0;
  const c = parseFloat(document.getElementById('f-c').value)||0;
  const healthy = document.getElementById('f-healthy').value === '1';
  if(!name || !cal) { showToast('請填入名稱和熱量'); return; }
  S.foods.push({id: S.nextFoodId++, name, cal, p, f, c, healthy});
  saveState(); showToast('已新增「'+name+'」'); render();
}
function deleteFood(id) {
  if(!confirm('確定刪除這個食物？')) return;
  S.foods = S.foods.filter(f=>f.id!==id);
  saveState(); render();
}
function toggleEditFood(id) {
  const el = document.getElementById('food-edit-'+id);
  if(!el) return;
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}
function saveEditFood(id) {
  const f = S.foods.find(f=>f.id===id);
  if(!f) return;
  f.name    = document.getElementById('ef-name-'+id).value.trim() || f.name;
  f.cal     = parseFloat(document.getElementById('ef-cal-'+id).value)||f.cal;
  f.p       = parseFloat(document.getElementById('ef-p-'+id).value)||f.p;
  f.f       = parseFloat(document.getElementById('ef-f-'+id).value)||f.f;
  f.c       = parseFloat(document.getElementById('ef-c-'+id).value)||f.c;
  f.healthy = document.getElementById('ef-healthy-'+id).value === '1';
  saveState(); showToast('已更新「'+f.name+'」'); render();
}
function toggleHealthGroup(key) {
  if(!window._openHealth) window._openHealth = {};
  window._openHealth[key] = window._openHealth[key] === false ? true : false;
  render();
}
function toggleCat(cat) {
  if(!window._openCats) window._openCats = {};
  window._openCats[cat] = window._openCats[cat] === false ? true : false;
  render();
}
function addCat() {
  const name = document.getElementById('new-cat').value.trim();
  if(!name) return;
  if(!S.categories) S.categories = [];
  if(S.categories.includes(name)) { showToast('分類已存在'); return; }
  S.categories.push(name);
  saveState(); render();
}
function deleteCat(i) {
  if(!confirm('確定刪除此分類？食物不會被刪除')) return;
  const cat = S.categories[i];
  S.foods.forEach(f=>{ if(f.cat===cat) f.cat=''; });
  S.categories.splice(i,1);
  saveState(); render();
}
function editCat(i) {
  const name = prompt('修改分類名稱', S.categories[i]);
  if(!name || name === S.categories[i]) return;
  const old = S.categories[i];
  S.foods.forEach(f=>{ if(f.cat===old) f.cat=name; });
  S.categories[i] = name;
  saveState(); render();
}
function saveGoals() {
  const p = parseInt(document.getElementById('g-p').value)||30;
  const f = parseInt(document.getElementById('g-f').value)||25;
  const c = parseInt(document.getElementById('g-c').value)||45;
  if(p+f+c !== 100) { showToast(`三者合計需為 100%（目前 ${p+f+c}%）`); return; }
  S.goals = { pRatio: p/100, fRatio: f/100, cRatio: c/100 };
  saveState(); showToast('目標已更新');
}
function exportData() {
  const json = JSON.stringify(S, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `nutrition-backup-${date}.json`;
  a.click(); URL.revokeObjectURL(url);
  showToast('備份已下載 ✓');
}
function importData(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if(!data.foods || !data.exercises) throw new Error('格式錯誤');
      S = data;
      saveState(); showToast('資料已還原 ✓'); render();
    } catch(err) {
      showToast('匯入失敗：格式不正確');
    }
  };
  reader.readAsText(file);
  input.value = '';
}
function resetAll() {
  if(!confirm('確定清除所有資料？此操作無法復原。')) return;
  S = JSON.parse(JSON.stringify(DEFAULT_STATE));
  saveState(); showToast('已還原預設資料'); render();
}

// ── Init ───────────────────────────────────────────────────────────────────
render();
loadState();
</script>

</body>
